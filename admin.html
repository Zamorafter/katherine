<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center">
            <h2>Panel de Administración</h2>
            <button id="logoutBtn" class="btn btn-danger">Cerrar sesión</button>
        </div>

        <h3 class="mt-4">Citas programadas</h3>
        <table class="table table-bordered" id="tablaCitas">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Cliente</th>
                    <th>Servicio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="citasBody">
                <!-- Se llena con JS -->
            </tbody>
        </table>

        <h3 class="mt-4">Configuración de redes</h3>
        <form id="settingsForm">
            <div class="mb-3">
                <label>WhatsApp (número con código, sin +)</label>
                <input type="text" class="form-control" id="whatsapp" required>
            </div>
            <div class="mb-3">
                <label>Instagram (URL completa)</label>
                <input type="url" class="form-control" id="instagram" required>
            </div>
            <div class="mb-3">
                <label>TikTok (URL completa)</label>
                <input type="url" class="form-control" id="tiktok" required>
            </div>
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </form>
    </div>

    <!-- Modal para editar cita -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar cita</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label>Nombre</label>
                            <input type="text" class="form-control" id="editNombre" required>
                        </div>
                        <div class="mb-3">
                            <label>Apellido</label>
                            <input type="text" class="form-control" id="editApellido" required>
                        </div>
                        <div class="mb-3">
                            <label>Servicio</label>
                            <select class="form-control" id="editServicio" required>
                                <!-- Se llena con JS -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Fecha</label>
                            <input type="date" class="form-control" id="editFecha" required>
                        </div>
                        <div class="mb-3">
                            <label>Hora</label>
                            <select class="form-control" id="editHora" required>
                                <option value="9:00">9:00</option>
                                <option value="11:00">11:00</option>
                                <option value="13:00">13:00</option>
                                <option value="15:00">15:00</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="guardarEdicion">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
